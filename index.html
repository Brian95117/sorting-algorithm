<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorting Algorithm Visualizer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, #1e3a8a 0%, transparent 28%),
        radial-gradient(circle at top right, #065f46 0%, transparent 22%),
        linear-gradient(135deg, #0f172a, #111827 45%, #1f2937);
      color: #e5e7eb;
      min-height: 100vh;
    }

    .wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(96, 165, 250, 0.35);
      color: #93c5fd;
      font-size: 14px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 44px;
      color: #f9fafb;
    }

    .hero p {
      margin: 0 auto;
      max-width: 800px;
      color: #cbd5e1;
      font-size: 17px;
      line-height: 1.8;
    }

    .panel {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      margin-bottom: 24px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-group label {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 600;
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.92);
      color: #111827;
      font-size: 15px;
    }

    .range-value {
      font-size: 13px;
      color: #93c5fd;
      font-weight: 700;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: white;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
    }

    .btn-success {
      background: linear-gradient(135deg, #059669, #10b981);
      color: white;
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.28);
    }

    .btn-warning {
      background: linear-gradient(135deg, #d97706, #f59e0b);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #f3f4f6;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 18px;
    }

    .stat-card h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 600;
    }

    .stat-card p {
      margin: 0;
      font-size: 26px;
      font-weight: 800;
      color: #f8fafc;
    }

    .stat-card.status p {
      font-size: 18px;
      line-height: 1.5;
      color: #93c5fd;
    }

    .visual-panel {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 28px;
      padding: 26px 20px 20px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.26);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 16px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    .canvas {
      height: 480px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      padding: 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      overflow: hidden;
      position: relative;
    }

    .bar {
      flex: 1;
      min-width: 8px;
      max-width: 28px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(180deg, #60a5fa, #2563eb);
      transition: height 0.16s ease, transform 0.16s ease, opacity 0.16s ease;
      position: relative;
    }

    .bar.active {
      background: linear-gradient(180deg, #f97316, #ef4444);
      transform: scaleY(1.02);
    }

    .bar.compare {
      background: linear-gradient(180deg, #facc15, #eab308);
    }

    .bar.sorted {
      background: linear-gradient(180deg, #34d399, #10b981);
    }

    .bar.pivot {
      background: linear-gradient(180deg, #f472b6, #ec4899);
    }

    .bar span {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #94a3b8;
    }

    .footer-note {
      margin-top: 16px;
      color: #94a3b8;
      font-size: 14px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .controls-grid,
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      h1 {
        font-size: 34px;
      }

      .canvas {
        height: 380px;
      }
    }

    @media (max-width: 640px) {
      .controls-grid,
      .stats {
        grid-template-columns: 1fr;
      }

      .btn-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .canvas {
        height: 320px;
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <section class="hero">
      <div class="badge">Interactive Sorting Algorithm Visualizer</div>
      <h1>排序演算法互動視覺化</h1>
      <p>
        可調整資料量、速度、排序法，並即時觀察比較、交換與排序完成的過程。
        這不是單純展示頁，而是可以操作的互動式演算法模擬器。
      </p>
    </section>

    <section class="panel">
      <div class="controls-grid">
        <div class="control-group">
          <label for="algorithm">排序法</label>
          <select id="algorithm">
            <option value="bubble">Bubble Sort</option>
            <option value="selection">Selection Sort</option>
            <option value="insertion">Insertion Sort</option>
          </select>
        </div>

        <div class="control-group">
          <label for="sizeRange">資料數量</label>
          <input type="range" id="sizeRange" min="10" max="60" value="30" />
          <div class="range-value">目前：<span id="sizeValue">30</span></div>
        </div>

        <div class="control-group">
          <label for="speedRange">動畫速度</label>
          <input type="range" id="speedRange" min="10" max="300" value="80" />
          <div class="range-value">延遲：<span id="speedValue">80</span> ms</div>
        </div>

        <div class="control-group">
          <label>目前模式</label>
          <div class="range-value" id="modeText">可互動操作</div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="generateBtn">重新產生資料</button>
        <button class="btn-success" id="startBtn">開始排序</button>
        <button class="btn-warning" id="pauseBtn">暫停</button>
        <button class="btn-secondary" id="resumeBtn">繼續</button>
        <button class="btn-secondary" id="resetBtn">重設統計</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h3>比較次數</h3>
          <p id="compareCount">0</p>
        </div>
        <div class="stat-card">
          <h3>交換次數</h3>
          <p id="swapCount">0</p>
        </div>
        <div class="stat-card">
          <h3>資料筆數</h3>
          <p id="itemCount">30</p>
        </div>
        <div class="stat-card status">
          <h3>狀態</h3>
          <p id="statusText">等待開始</p>
        </div>
      </div>
    </section>

    <section class="visual-panel">
      <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background:#2563eb;"></span>未排序</div>
        <div class="legend-item"><span class="legend-color" style="background:#eab308;"></span>比較中</div>
        <div class="legend-item"><span class="legend-color" style="background:#ef4444;"></span>交換 / 作用中</div>
        <div class="legend-item"><span class="legend-color" style="background:#10b981;"></span>已排序</div>
      </div>

      <div class="canvas" id="canvas"></div>
      <div class="footer-note">提示：先改資料量和速度，再按「開始排序」體驗最佳。</div>
    </section>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const algorithmSelect = document.getElementById("algorithm");
    const sizeRange = document.getElementById("sizeRange");
    const speedRange = document.getElementById("speedRange");
    const sizeValue = document.getElementById("sizeValue");
    const speedValue = document.getElementById("speedValue");
    const modeText = document.getElementById("modeText");

    const compareCountEl = document.getElementById("compareCount");
    const swapCountEl = document.getElementById("swapCount");
    const itemCountEl = document.getElementById("itemCount");
    const statusText = document.getElementById("statusText");

    const generateBtn = document.getElementById("generateBtn");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const resetBtn = document.getElementById("resetBtn");

    let values = [];
    let compareCount = 0;
    let swapCount = 0;
    let isSorting = false;
    let isPaused = false;
    let stopRequested = false;

    function randomValue() {
      return Math.floor(Math.random() * 360) + 20;
    }

    function updateCounters() {
      compareCountEl.textContent = compareCount;
      swapCountEl.textContent = swapCount;
      itemCountEl.textContent = values.length;
    }

    function updateStatus(text) {
      statusText.textContent = text;
    }

    function getDelay() {
      return Number(speedRange.value);
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function waitWhilePaused() {
      while (isPaused) {
        await sleep(60);
      }
    }

    function renderBars(active = [], compare = [], sorted = []) {
      canvas.innerHTML = "";
      const showLabels = values.length <= 20;

      values.forEach((value, index) => {
        const bar = document.createElement("div");
        bar.className = "bar";
        bar.style.height = `${value}px`;

        if (sorted.includes(index)) bar.classList.add("sorted");
        if (compare.includes(index)) bar.classList.add("compare");
        if (active.includes(index)) bar.classList.add("active");

        if (showLabels) {
          const label = document.createElement("span");
          label.textContent = value;
          bar.appendChild(label);
        }

        canvas.appendChild(bar);
      });
    }

    function generateData() {
      if (isSorting) return;
      const size = Number(sizeRange.value);
      values = Array.from({ length: size }, randomValue);
      updateCounters();
      renderBars();
      updateStatus("已產生新資料");
    }

    function resetStats() {
      if (isSorting) return;
      compareCount = 0;
      swapCount = 0;
      updateCounters();
      updateStatus("統計已重設");
    }

    async function bubbleSort() {
      const sorted = [];
      for (let i = 0; i < values.length; i++) {
        for (let j = 0; j < values.length - i - 1; j++) {
          if (stopRequested) return;
          await waitWhilePaused();

          compareCount++;
          updateCounters();
          updateStatus(`Bubble Sort：比較 index ${j} 和 ${j + 1}`);
          renderBars([], [j, j + 1], sorted);
          await sleep(getDelay());

          if (values[j] > values[j + 1]) {
            swapCount++;
            [values[j], values[j + 1]] = [values[j + 1], values[j]];
            updateCounters();
            updateStatus(`Bubble Sort：交換 index ${j} 和 ${j + 1}`);
            renderBars([j, j + 1], [], sorted);
            await sleep(getDelay());
          }
        }
        sorted.unshift(values.length - i - 1);
        renderBars([], [], sorted);
      }
    }

    async function selectionSort() {
      const sorted = [];
      for (let i = 0; i < values.length; i++) {
        let minIndex = i;
        for (let j = i + 1; j < values.length; j++) {
          if (stopRequested) return;
          await waitWhilePaused();

          compareCount++;
          updateCounters();
          updateStatus(`Selection Sort：比較最小值 index ${minIndex} 與 index ${j}`);
          renderBars([minIndex], [j], sorted);
          await sleep(getDelay());

          if (values[j] < values[minIndex]) {
            minIndex = j;
            renderBars([minIndex], [], sorted);
            await sleep(Math.max(30, getDelay() / 2));
          }
        }

        if (minIndex !== i) {
          swapCount++;
          [values[i], values[minIndex]] = [values[minIndex], values[i]];
          updateCounters();
          updateStatus(`Selection Sort：將最小值放到位置 ${i}`);
          renderBars([i, minIndex], [], sorted);
          await sleep(getDelay());
        }

        sorted.push(i);
        renderBars([], [], sorted);
      }
    }

    async function insertionSort() {
      const sorted = [0];
      renderBars([], [], sorted);

      for (let i = 1; i < values.length; i++) {
        let key = values[i];
        let j = i - 1;

        if (stopRequested) return;
        await waitWhilePaused();

        updateStatus(`Insertion Sort：插入第 ${i + 1} 個元素`);
        renderBars([i], [], sorted);
        await sleep(getDelay());

        while (j >= 0 && values[j] > key) {
          if (stopRequested) return;
          await waitWhilePaused();

          compareCount++;
          swapCount++;
          values[j + 1] = values[j];
          updateCounters();
          renderBars([j + 1], [j], sorted);
          updateStatus(`Insertion Sort：右移 index ${j}`);
          await sleep(getDelay());
          j--;
        }

        if (j >= 0) {
          compareCount++;
          updateCounters();
        }

        values[j + 1] = key;
        sorted.push(i);
        renderBars([j + 1], [], [...Array(i + 1).keys()]);
        await sleep(getDelay());
      }
    }

    async function startSorting() {
      if (isSorting) return;

      isSorting = true;
      isPaused = false;
      stopRequested = false;
      compareCount = 0;
      swapCount = 0;
      updateCounters();

      const algorithm = algorithmSelect.value;
      modeText.textContent = `${algorithm.toUpperCase()} 執行中`;
      updateStatus("開始排序");

      try {
        if (algorithm === "bubble") {
          await bubbleSort();
        } else if (algorithm === "selection") {
          await selectionSort();
        } else if (algorithm === "insertion") {
          await insertionSort();
        }

        if (!stopRequested) {
          renderBars([], [], [...Array(values.length).keys()]);
          updateStatus("排序完成");
        } else {
          updateStatus("排序已中止");
        }
      } finally {
        isSorting = false;
        isPaused = false;
        modeText.textContent = "可互動操作";
      }
    }

    function pauseSorting() {
      if (!isSorting) return;
      isPaused = true;
      updateStatus("已暫停");
    }

    function resumeSorting() {
      if (!isSorting) return;
      isPaused = false;
      updateStatus("繼續排序中");
    }

    function stopAndReset() {
      if (isSorting) {
        stopRequested = true;
        isPaused = false;
      }
      compareCount = 0;
      swapCount = 0;
      updateCounters();
      generateData();
      modeText.textContent = "可互動操作";
    }

    sizeRange.addEventListener("input", () => {
      sizeValue.textContent = sizeRange.value;
      itemCountEl.textContent = sizeRange.value;
      generateData();
    });

    speedRange.addEventListener("input", () => {
      speedValue.textContent = speedRange.value;
    });

    algorithmSelect.addEventListener("change", () => {
      updateStatus(`已切換為 ${algorithmSelect.options[algorithmSelect.selectedIndex].text}`);
    });

    generateBtn.addEventListener("click", generateData);
    startBtn.addEventListener("click", startSorting);
    pauseBtn.addEventListener("click", pauseSorting);
    resumeBtn.addEventListener("click", resumeSorting);
    resetBtn.addEventListener("click", stopAndReset);

    generateData();
  </script>
</body>
</html>
